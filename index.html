<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Doodle Board</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1>Daily Doodle Board</h1>
        <p>Draw with your mouse. Keep it simple and fun.</p>
      </header>

      <section class="controls" aria-label="Drawing controls">
        <label class="control">
          Brush Color
          <input id="colorPicker" type="color" value="#111827" />
        </label>

        <label class="control">
          Brush Size
          <input id="brushSize" type="range" min="1" max="40" value="6" />
          <span id="brushSizeValue">6px</span>
        </label>

        <button id="clearCanvas" type="button">Clear Board</button>
      </section>

      <section class="canvas-wrap">
        <canvas
          id="doodleCanvas"
          width="960"
          height="540"
          aria-label="Doodle drawing area"
        ></canvas>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
